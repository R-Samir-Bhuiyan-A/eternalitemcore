name: OT-item
version: '1.0.0'
main: com.otitem.OTItem
api-version: '1.20'
authors: [ Open trident ]
description: A modular stat + evolution + ability + effect system driven entirely by config.
commands:
  otitem:
    description: Main plugin command
    aliases: [oit]
    permission: otitem.admin
permissions:
  otitem.admin:
    description: Admin permissions for OT-item
    default: op
  otitem.player:
    description: Player commands for OT-item
    default: true
